[build]
  # All builds and deploys are handled by GitHub Actions (deploy-web.yml).
  # This ignore script prevents Netlify from double-deploying on git push.
  publish = "site/public"
  ignore = "exit 0"

# Security headers applied to all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://eoqycogokelfmgwqydkj.supabase.co https://www.googleapis.com https://oauth2.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Clean-URL redirects for pages served as .html files
[[redirects]]
  from = "/mechanics"
  to = "/mechanics.html"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 301

# Bare /app path
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

# Bare /webapp path
[[redirects]]
  from = "/webapp"
  to = "/webapp/index.html"
  status = 200

# wasmJs app — all paths route to index.html for client-side navigation
[[redirects]]
  from = "/webapp/*"
  to = "/webapp/index.html"
  status = 200

# OAuth callback: redirect to /webapp/ so the Compose wasmJs app handles the auth code.
# Must come before the /app/* catch-all so Netlify matches it first.
[[redirects]]
  from = "/auth/callback"
  to = "/webapp/"
  status = 302

# Auth callback deep-links (OAuth redirects back to /app/)
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200
