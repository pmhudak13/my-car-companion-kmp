[build]
  # Static site — no build step needed. All files are pre-built and committed.
  publish = "site/public"

# Bare /app path
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

# Auth callback deep-links (OAuth redirects back to /app/)
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200
