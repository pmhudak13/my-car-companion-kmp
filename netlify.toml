[build]
  # All builds and deploys are handled by GitHub Actions (deploy-web.yml).
  # This ignore script prevents Netlify from double-deploying on git push.
  publish = "site/public"
  ignore = "exit 0"

# Clean-URL redirects for pages served as .html files
[[redirects]]
  from = "/mechanics"
  to = "/mechanics.html"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 301

# Bare /app path
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

# OAuth callback: redirect to /app/ so the Compose app can handle the auth code from the query string.
# Must come before the /app/* catch-all so Netlify matches it first.
[[redirects]]
  from = "/auth/callback"
  to = "/app/"
  status = 302

# Auth callback deep-links (OAuth redirects back to /app/)
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200
