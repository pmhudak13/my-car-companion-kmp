name: Deploy Web App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build wasmJs app
        run: ./gradlew :webApp:wasmJsBrowserDistribution --no-daemon

      - name: Inject Supabase key into app index
        run: |
          sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            webApp/build/dist/wasmJs/productionExecutable/index.html

      - name: Assemble site
        run: |
          rm -rf site/public/app
          mkdir -p site/public/app
          cp -r webApp/build/dist/wasmJs/productionExecutable/. site/public/app/

      - name: Deploy to Netlify
        run: npx --yes netlify-cli deploy --dir=site/public --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
