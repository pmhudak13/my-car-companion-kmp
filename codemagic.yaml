workflows:

  # ─────────────────────────────────────────────
  # Android — Play Store build (KMP / Compose Multiplatform)
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true

    environment:
      android_signing:
        - Car Companion
      groups:
        - google_play
        - supabase
      java: 21
      vars:
        PACKAGE_NAME: org.mycarcompanion.app

    scripts:
      - name: Write Supabase credentials to local.properties
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> local.properties
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties

      - name: Bump version code
        script: |
          # Query Google Play for the latest published version code, then increment
          LATEST=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            NEW_VERSION_CODE=$((BUILD_NUMBER + 20))
          else
            NEW_VERSION_CODE=$((LATEST + 1))
          fi
          echo "Latest Play Store versionCode=$LATEST → new versionCode=$NEW_VERSION_CODE"

          # Directly rewrite the file on disk (same approach as old Capacitor CI)
          sed -i.bak "s/versionCode = [0-9]*/versionCode = $NEW_VERSION_CODE/" androidApp/build.gradle.kts
          echo "=== Verify ==="
          grep "versionCode" androidApp/build.gradle.kts

      - name: Build signed Android App Bundle (AAB)
        script: |
          ./gradlew :androidApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - androidApp/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - pmhudak13@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
