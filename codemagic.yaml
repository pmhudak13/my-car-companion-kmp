workflows:

  # ─────────────────────────────────────────────
  # Android — Play Store build (KMP / Compose Multiplatform)
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - Car Companion
      groups:
        - google_play
        - supabase
      java: 21

    scripts:
      - name: Write Supabase credentials to local.properties
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" >> local.properties
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties

      - name: Build signed Android App Bundle (AAB)
        script: |
          # Offset by 20 to exceed all old Capacitor version codes (which used BUILD_NUMBER + 11)
          VERSION_CODE=$((BUILD_NUMBER + 20))
          echo "BUILD_NUMBER=$BUILD_NUMBER → versionCode=$VERSION_CODE"
          ./gradlew :androidApp:bundleRelease \
            -PversionCode=$VERSION_CODE \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - androidApp/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - pmhudak13@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
