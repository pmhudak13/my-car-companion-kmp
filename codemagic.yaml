workflows:

  # ─────────────────────────────────────────────
  # Android — Play Store build (KMP / Compose Multiplatform)
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - Car Companion
      groups:
        - Google Play
        - Supabase
      java: 21

    scripts:
      - name: Write Supabase credentials to local.properties
        script: |
          cat >> local.properties <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          EOF

      - name: Build signed Android App Bundle (AAB)
        script: |
          ./gradlew :androidApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD

    artifacts:
      - androidApp/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - pmhudak13@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
