    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1B2B50; }
        canvas { display: block; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #1B2B50; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            gap: 16px;
        }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(107,188,222,0.3);
            border-top-color: #6BBCDE;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #6BBCDE; font-size: 14px; letter-spacing: 0.5px; }
    </style>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading My Car Companion…</p>
    </div>
    <canvas id="ComposeTarget"></canvas>
    <script>
        // Bridge: /app/ writes the session to sessionStorage._mcc_handoff.
        // The compiled wasm binary (main.kt at eaaadad) reads from the URL hash
        // (#access_token=...). This script runs synchronously BEFORE webApp.js so
        // parseHashSession() in the wasm finds the tokens in the expected place.
        // Uses history.replaceState so tokens never appear in browser history.
        (function() {
            try {
                var raw = sessionStorage.getItem('_mcc_handoff');
                if (raw) {
                    sessionStorage.removeItem('_mcc_handoff');
                    var s = JSON.parse(raw);
                    if (s && s.access_token) {
                        var hash = 'access_token=' + encodeURIComponent(s.access_token)
                            + '&refresh_token=' + encodeURIComponent(s.refresh_token || '')
                            + '&token_type=bearer&expires_in=' + (s.expires_in || 3600);
                        history.replaceState(null, '', window.location.pathname
                            + window.location.search + '#' + hash);
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script type="application/javascript" src="webApp.js"></script>
    <script>
        function showFatalError(msg) {
            var el = document.getElementById('loading');
            if (el) {
                el.innerHTML = '<div style="text-align:center;padding:32px;max-width:480px">'
                    + '<p style="color:#FF6B6B;font-size:18px;margin-bottom:12px">Something went wrong</p>'
                    + '<p style="color:#aaa;font-size:13px;word-break:break-word">' + (msg || 'Unknown error') + '</p>'
                    + '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#6BBCDE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">Reload</button>'
                    + '</div>';
            }
        }

        // Surface any JS/Wasm crash that escapes the Kotlin error boundary.
        window.onerror = function(msg, src, line, col, err) {
            showFatalError(err ? err.toString() : msg);
        };
        window.addEventListener('unhandledrejection', function(e) {
            showFatalError(e.reason ? e.reason.toString() : 'Unhandled promise rejection');
        });

        // Hide loading screen once Compose adds its canvas to document.body.
        // ComposeViewport(document.body!!) creates a new <canvas> child — we watch for that.
        // Also watch attribute changes on any existing canvas (belt-and-suspenders).
        (function() {
            var hidden = false;
            function hide() {
                if (hidden) return;
                hidden = true;
                var loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }
            var observer = new MutationObserver(function(mutations) {
                for (var i = 0; i < mutations.length; i++) {
                    var m = mutations[i];
                    if (m.type === 'childList') {
                        for (var j = 0; j < m.addedNodes.length; j++) {
                            if (m.addedNodes[j].nodeName === 'CANVAS') { hide(); observer.disconnect(); return; }
                        }
                    }
                    if (m.type === 'attributes' && m.target.nodeName === 'CANVAS') { hide(); observer.disconnect(); return; }
                }
            });
            observer.observe(document.body || document.documentElement, {
                childList: true, subtree: true, attributes: true, attributeFilter: ['width', 'height']
            });
            // Safety net: if Compose never fires, stop the spinner after 30 s.
            setTimeout(hide, 30000);
        })();
    </script>
</body>
</html>
