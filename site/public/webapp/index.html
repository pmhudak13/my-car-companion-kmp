<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Car Companion — App</title>
    <meta name="description" content="Track your vehicles, find trusted mechanics, and stay on top of maintenance — all in one place.">
    <script>
        // Injected by Netlify build via netlify-plugin-inline-env or set directly.
        // For local dev, set window.__SUPABASE_ANON_KEY__ manually or via a local script.
        window.__SUPABASE_URL__ = "https://eoqycogokelfmgwqydkj.supabase.co";
        window.__SUPABASE_ANON_KEY__ = "SUPABASE_ANON_KEY_PLACEHOLDER";
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1B2B50; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #1B2B50; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            gap: 16px;
        }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(107,188,222,0.3);
            border-top-color: #6BBCDE;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { color: #6BBCDE; font-size: 14px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading My Car Companion…</p>
    </div>
    <canvas id="ComposeTarget"></canvas>
    <script type="application/javascript" src="webApp.js"></script>
    <script>
        function showFatalError(msg) {
            var el = document.getElementById('loading');
            if (el) {
                el.innerHTML = '<div style="text-align:center;padding:32px;max-width:480px">'
                    + '<p style="color:#FF6B6B;font-size:18px;margin-bottom:12px">Something went wrong</p>'
                    + '<p style="color:#aaa;font-size:13px;word-break:break-word">' + (msg || 'Unknown error') + '</p>'
                    + '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#6BBCDE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">Reload</button>'
                    + '</div>';
            }
        }

        // Surface any JS/Wasm crash that escapes the Kotlin error boundary.
        window.onerror = function(msg, src, line, col, err) {
            showFatalError(err ? err.toString() : msg);
        };
        window.addEventListener('unhandledrejection', function(e) {
            showFatalError(e.reason ? e.reason.toString() : 'Unhandled promise rejection');
        });

        // Remove loading screen once Compose is ready.
        document.addEventListener('DOMContentLoaded', function() {
            var canvas = document.getElementById('ComposeTarget');
            if (canvas) {
                var observer = new MutationObserver(function() {
                    var loading = document.getElementById('loading');
                    if (loading) loading.style.display = 'none';
                });
                observer.observe(canvas, { attributes: true, childList: true });
            }
        });
    </script>
</body>
</html>
